services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: banksimulator
      POSTGRES_USER: banksimulator
      POSTGRES_PASSWORD: banksimulator
    ports:
      # 5433 no host para não conflitar com um Postgres local eventual
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banksimulator -d banksimulator"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s

volumes:
  pgdata:
