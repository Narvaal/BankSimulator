# Profile "docker" — dev local com Postgres 17 real via docker compose
# (mesma major do RDS de produção; paridade para JSONB/JSON_VALUE)

# ── Database (Postgres do docker-compose) ─────────────────────────────────────
# DB_HOST/DB_PORT permitem o modo híbrido: backend fora do container apontando
# para o Postgres do compose (DB_HOST=localhost DB_PORT=5433)
db.default.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/banksimulator
db.default.user=banksimulator
db.default.password=banksimulator
db.use.test=true
db.schema.auto-create=true

# ── JWT ───────────────────────────────────────────────────────────────────────
security.jwt.secret-key=bG9jYWwtZGV2LXNlY3JldC1mb3ItdGVzdGluZy1vbmx5LTEyMzQ1Njc4OTA=
security.jwt.expiration-time=86400000

# ── Tokens (dummy) ────────────────────────────────────────────────────────────
admin.trigger.token=local-admin-token
kofi.verification-token=local-kofi-token
google.client-id=1002611612778-vu90lu6se8gf5ifmpifitiimhjn0bruu.apps.googleusercontent.com

# ── Email (LogEmailService imprime no console, sem AWS SES) ──────────────────
aws.ses.from=local@localhost

# ── URLs ─────────────────────────────────────────────────────────────────────
app.base-url=http://localhost:5000

# ── Webhook (desabilitado local) ─────────────────────────────────────────────
webhook.asset.enabled=false
webhook.asset.url=

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ── Cookie (sem Secure e sem domínio fixo para funcionar em HTTP/localhost) ───
auth.cookie.domain=
auth.cookie.secure=false
auth.cookie.same-site=Lax
