# ── Database (H2 in-memory, PostgreSQL compat) ────────────────────────────────
db.default.url=jdbc:h2:mem:localdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
db.default.user=sa
db.default.password=
db.use.test=true
db.schema.auto-create=true

# ── JWT ───────────────────────────────────────────────────────────────────────
security.jwt.secret-key=bG9jYWwtZGV2LXNlY3JldC1mb3ItdGVzdGluZy1vbmx5LTEyMzQ1Njc4OTA=
security.jwt.expiration-time=86400000

# ── Tokens (dummy) ────────────────────────────────────────────────────────────
admin.trigger.token=local-admin-token
kofi.verification-token=local-kofi-token
google.client-id=local-google-client-id.apps.googleusercontent.com

# ── Email (LogEmailService imprime no console, sem AWS SES) ──────────────────
aws.ses.from=local@localhost

# ── URLs ─────────────────────────────────────────────────────────────────────
app.base-url=http://localhost:5000

# ── Webhook (desabilitado local) ─────────────────────────────────────────────
webhook.asset.enabled=false
webhook.asset.url=

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000
